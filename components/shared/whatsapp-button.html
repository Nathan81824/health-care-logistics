    <!-- Chat -->
    <div
        class="chat-box"
        id="chatBox">

        <!-- Header -->
        <div class="chat-header">

            <div class="chat-user">

                <div class="chat-avatar">

                    <i class="fa-brands fa-whatsapp"></i>

                </div>

                <div>

                    <h3>IDOKO LEGACY</h3>

                    <span>

                        <span class="online"></span>

                        Online

                    </span>

                </div>

            </div>

            <button
                id="closeChat"
                class="close-chat">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <!-- Messages -->
        <div class="chat-body">

            <div class="message">

                👋 Hello!

                <br><br>

                Welcome to <strong>IDOKO LEGACY.</strong>

                <br><br>

                We are ready to help you with your healthcare logistics.

            </div>

        </div>

        <!-- Quick Replies -->

        <div class="quick-replies">

            <button>🚑 Request Pickup</button>

            <button>📦 Track Delivery</button>

            <button>💊 Medical Supplies</button>

            <button>❄️ Cold Chain</button>

            <button>📞 Contact Us</button>

        </div>

        <!-- Input -->

        <div class="chat-input">

            <input
                id="waMessage"
                type="text"
                placeholder="Type a message...">

            <button id="sendMessage">

                <i class="fa-solid fa-paper-plane"></i>

            </button>

        </div>

        <!-- Continue -->

        <a
            id="continueWhatsapp"
            class="continue-btn"
            href="#"
            target="_blank">

            <i class="fa-brands fa-whatsapp"></i>

            Continue with WhatsApp

        </a>

    </div>

</div>
